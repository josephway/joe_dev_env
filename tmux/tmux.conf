# ~/.tmux.conf

unbind C-b
set -g prefix C-\\
bind C-\\ send-prefix

setw -g xterm-keys on

# 窗口和面板的编号从 1 开始
set -g base-index 1
set -g pane-base-index 1

# 开启鼠标支持
set -g mouse on

# 窗口关闭后重新编号
set -g renumber-windows on

# 设置默认 shell 为 zsh
set -g default-shell /bin/zsh

# 状态栏配置
set -g status-left-length 40  # 左侧状态栏长度
set -g status-left "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P"  # 状态栏左侧内容
set -g status-right "#[fg=cyan]%b %d %R"  # 状态栏右侧内容
set -g status-interval 60  # 状态栏刷新间隔（秒）
set -g status-justify centre  # 状态栏内容居中

# 面板边框样式
set -g pane-border-style bg=black
set -g pane-active-border-style fg=white,bg=yellow

# 消息样式
set -g message-style fg=white,bg=black

# 窗口状态样式
setw -g window-status-style fg=black,bg=default,dim
setw -g window-status-current-style fg=white,bg=red,bright

# 活动监控设置
setw -g monitor-activity on
set -g visual-activity on

# 快捷键绑定：重载配置文件为 'r'
bind r source-file ~/.tmux.conf \; display-message "Config reloaded.."

# 使用 vi 模式的复制模式
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line

# 切换面板的快捷键设置（类似于 vim）
bind-key k select-pane -U  # 上移面板
bind-key j select-pane -D  # 下移面板
bind-key h select-pane -L  # 左移面板
bind-key l select-pane -R  # 右移面板

# 启用 UTF-8 支持的状态栏
#set -g status-utf8 on

# 自动重命名窗口关闭时的行为
setw -g automatic-rename off  # 禁用自动重命名窗口功能以提高性能

# 插件管理器配置
set -g @plugin 'tmux-plugins/tpm'           # Tmux 插件管理器
set -g @plugin 'tmux-plugins/tmux-resurrect' # 会话保存/恢复
set -g @plugin 'tmux-plugins/tmux-continuum' # 自动保存
set -g @plugin 'tmux-plugins/tmux-open'      # 点击打开文件/URL
set -g @open-editor-command 'zed'             # 用 zed 打开文件

# resurrect 配置
set -g @resurrect-capture-pane-contents 'on'  # 保存 pane 内容
set -g @resurrect-strategy-vim 'session'      # Vim 会话恢复
set -g @resurrect-strategy-nvim 'session'     # Neovim 会话恢复
set -g @resurrect-save-shell-history 'on'     # 保存 shell 历史

# continuum 自动保存配置
set -g @continuum-restore 'on'                # 重启后自动恢复
set -g @continuum-save-interval '15'          # 每 15 分钟自动保存
set -g @continuum-boot 'on'                   # 系统启动时启动 tmux
set -g @continuum-boot-options 'iterm'        # macOS 使用 iTerm/Terminal.app

run '~/.tmux/plugins/tpm/tpm'                 # 初始化插件管理器

# 覆盖插件默认绑定：URL 用浏览器，文件用 zed
bind -T copy-mode-vi o send-keys -X copy-pipe-and-cancel "sed 's|^~|$HOME|g' | xargs -I {} sh -c 'if echo \"{}\" | grep -qE \"^https?://\"; then open \"{}\"; else zed \"{}\"; fi'"
